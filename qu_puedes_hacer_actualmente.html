<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué puedes hacer actualmente?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .titulo {
            text-align: center;
            margin-bottom: 20px;
        }
        .texto {
            text-align: justify;
        }
        .boton {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .boton:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo">¿Qué puedes hacer actualmente?</h1>
        <p class="texto">Puedes:</p>
        <ul>
            <li>Realizar tareas pendientes</li>
            <li>Leer un libro o artículo interesante</li>
            <li>Ver una película o serie</li>
            <li>Realizar ejercicio o deporte</li>
            <li>Conectar con amigos o familiares</li>
        </ul>
        <button class="boton">Comienza a hacer algo!</button>
    </div>
</body>
</html>
