<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Que puedo hacer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .titulo {
            color: #007bff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .lista {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .lista li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        .lista li:last-child {
            border-bottom: none;
        }
        
        .lista li:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo">Que puedo hacer</h1>
        <ul class="lista">
            <li>Crear contenido</li>
            <li>Editar perfil</li>
            <li>Mensaje a un amigo</li>
            <li>Buscar</li>
            <li>Subir archivos</li>
        </ul>
    </div>
</body>
</html>
