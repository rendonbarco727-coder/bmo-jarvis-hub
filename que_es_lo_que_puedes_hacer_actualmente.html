<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Que es lo que puedes hacer actualmente?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .titulo {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }
        
        .lista {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .lista li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        .lista li:last-child {
            border-bottom: none;
        }
        
        .lista li:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo">Que es lo que puedes hacer actualmente?</h1>
        <ul class="lista">
            <li>Crear contenido</li>
            <li>Compartir tus ideas</li>
            <li>Conectar con otros</li>
            <li>Aprender algo nuevo</li>
            <li>Explorar y descubrir</li>
        </ul>
    </div>
</body>
</html>
