<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Desarrollador</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
        }
        
        .header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-between;
        }
        
        .header nav ul li {
            margin-right: 20px;
        }
        
        .header nav a {
            color: #fff;
            text-decoration: none;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .main h2 {
            margin-bottom: 10px;
        }
        
        .main .card {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .main .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            margin-bottom: 10px;
        }
        
        .main .card h3 {
            margin-bottom: 10px;
        }
        
        .main .card p {
            margin-bottom: 20px;
        }
        
        .footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            clear: both;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .main {
                padding: 10px;
            }
            
            .card {
                margin-bottom: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .header nav ul {
                flex-direction: column;
            }
            
            .header nav ul li {
                margin-right: 0;
                margin-bottom: 10px;
            }
            
            .main {
                padding: 5px;
            }
            
            .card {
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Portafolio Desarrollador</h1>
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Proyectos</a></li>
                    <li><a href="#">Sobre mí</a></li>
                    <li><a href="#">Contacto</a></li>
                </ul>
            </nav>
        </div>
        <div class="main">
            <h2>Proyectos</h2>
            <div class="card">
                <img src="https://picsum.photos/200/300" alt="Imagen de proyecto">
                <h3>Título del proyecto</h3>
                <p>Descripción del proyecto</p>
            </div>
            <div class="card">
                <img src="https://picsum.photos/200/301" alt="Imagen de proyecto">
                <h3>Título del proyecto</h3>
                <p>Descripción del proyecto</p>
            </div>
            <div class="card">
                <img src="https://picsum.photos/200/302" alt="Imagen de proyecto">
                <h3>Título del proyecto</h3>
                <p>Descripción del proyecto</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2023 Desarrollador</p>
        </div>
    </div>
</body>
</html>
